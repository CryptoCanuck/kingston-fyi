name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: kingston
          POSTGRES_PASSWORD: kingston
          POSTGRES_DB: kingston_fyi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kingston -d kingston_fyi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URI: postgres://kingston:kingston@localhost:5432/kingston_fyi_test
      PAYLOAD_SECRET: ci-test-secret-not-used-in-prod
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Apply Payload migrations
        run: npm run migrate
      - name: Tests
        run: npm run test:int

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Deploys to Railway (app + managed Postgres/PostGIS). Requires RAILWAY_TOKEN secret.
      # Skips cleanly when the token is absent so forks/CI without deploy creds still pass.
      - name: Deploy to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: |
          npm i -g @railway/cli
          railway up --service "${{ vars.RAILWAY_SERVICE || 'kingston-fyi' }}" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
